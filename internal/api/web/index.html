<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>claudeq</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg">
<style>
  :root {
    --accent:#007aff; --accent-fg:#fff;
    --bg:#f2f2f7; --sidebar:rgba(245,245,247,.8); --card:#ffffff; --card-2:#fbfbfd;
    --fg:#1d1d1f; --fg2:#6e6e73; --hairline:rgba(0,0,0,.10);
    --seg-bg:rgba(120,120,128,.12); --seg-active:#fff; --switch-off:rgba(120,120,128,.32);
    --ok:#34c759; --warn:#ff9f0a; --danger:#ff3b30; --running:#007aff;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 6px 20px rgba(0,0,0,.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --accent:#0a84ff; --bg:#1c1c1e; --sidebar:rgba(30,30,32,.72); --card:#2c2c2e; --card-2:#252527;
      --fg:#f5f5f7; --fg2:#98989d; --hairline:rgba(255,255,255,.12);
      --seg-bg:rgba(120,120,128,.24); --seg-active:#636366; --switch-off:rgba(120,120,128,.5);
      --ok:#30d158; --warn:#ff9f0a; --danger:#ff453a; --running:#0a84ff;
      --shadow:0 1px 3px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.35);
    }
  }
  /* Follow the user's macOS accent color when the browser exposes it. */
  @supports (color: AccentColor) {
    :root { --accent: AccentColor; --accent-fg: AccentColorText; }
  }
  * { box-sizing:border-box; }
  html,body { height:100%; }
  body {
    margin:0; display:flex; height:100vh; overflow:hidden;
    font:13px/1.45 -apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;
    color:var(--fg); background:var(--bg);
    -webkit-font-smoothing:antialiased;
  }
  /* Sidebar (source list) */
  .sidebar {
    width:220px; flex-shrink:0; background:var(--sidebar); backdrop-filter:saturate(180%) blur(20px);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
    border-right:.5px solid var(--hairline); padding:14px 10px; display:flex; flex-direction:column;
  }
  .brand { display:flex; align-items:center; gap:8px; padding:4px 8px 14px; }
  .brand .logo { width:24px; height:24px; border-radius:6px; display:block; }
  .brand b { font-size:14px; letter-spacing:.2px; }
  .nav { display:flex; flex-direction:column; gap:2px; }
  .nav button {
    display:flex; align-items:center; gap:9px; width:100%; text-align:left; border:none; cursor:pointer;
    background:none; color:var(--fg); padding:6px 8px; border-radius:7px; font-size:13px; font-weight:500;
  }
  .nav button:hover { background:rgba(120,120,128,.12); }
  .nav button.active { background:var(--accent); color:var(--accent-fg); }
  .nav button.active svg { stroke:var(--accent-fg); }
  .nav svg { width:16px; height:16px; stroke:var(--fg2); stroke-width:1.8; fill:none; flex-shrink:0; }
  .nav .count { margin-left:auto; background:var(--danger); color:#fff; font-size:11px; font-weight:600;
                min-width:18px; height:18px; border-radius:9px; display:grid; place-items:center; padding:0 5px; }
  .nav .count[hidden] { display:none; }
  .nav button.active .count { background:rgba(255,255,255,.3); }
  .side-foot { margin-top:auto; display:flex; align-items:center; gap:7px; padding:8px; color:var(--fg2); font-size:12px; }
  .side-foot .dot { width:8px; height:8px; border-radius:50%; background:var(--ok); }

  /* Main */
  .main { flex:1; display:flex; flex-direction:column; min-width:0; }
  .toolbar { height:52px; flex-shrink:0; display:flex; align-items:center; gap:12px; padding:0 22px;
             border-bottom:.5px solid var(--hairline); background:var(--card); }
  .toolbar h1 { font-size:15px; font-weight:600; margin:0; }
  .toolbar .spacer { flex:1; }
  .content { flex:1; overflow:auto; padding:22px; }
  .wrap { max-width:760px; margin:0 auto; }
  .section-label { font-size:12px; font-weight:600; color:var(--fg2); text-transform:uppercase;
                   letter-spacing:.4px; margin:0 0 8px 14px; }

  /* Buttons */
  .btn { font:inherit; font-size:13px; border:.5px solid var(--hairline); background:var(--card);
         color:var(--fg); padding:5px 12px; border-radius:7px; cursor:pointer; box-shadow:0 1px 1px rgba(0,0,0,.04);
         display:inline-flex; align-items:center; gap:6px; }
  .btn:hover { background:var(--card-2); }
  .btn:active { transform:translateY(.5px); }
  .btn.primary { background:var(--accent); color:#fff; border-color:transparent; }
  .btn.primary:hover { filter:brightness(1.06); }
  .btn.danger { color:var(--danger); }
  .btn.small { padding:3px 9px; font-size:12px; }
  .btn:disabled { opacity:.4; cursor:default; }
  .btn svg { width:14px; height:14px; stroke:currentColor; stroke-width:1.7; fill:none; flex:none; display:block; }
  .btn.iconly { padding:5px 7px; justify-content:center; }
  .row-actions { display:flex; align-items:center; gap:6px; }

  /* Grouped inset list */
  .group { background:var(--card); border-radius:11px; box-shadow:var(--shadow); overflow:hidden; margin-bottom:18px; }
  .row { display:flex; align-items:center; gap:12px; padding:11px 15px; border-bottom:.5px solid var(--hairline); }
  .row:last-child { border-bottom:none; }
  .grow { flex:1; min-width:0; }
  .row .title { font-weight:500; }
  .row .sub { color:var(--fg2); font-size:12px; margin-top:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .row .mono { font-family:"SF Mono",ui-monospace,Menlo,monospace; }

  /* Switch */
  .switch { position:relative; display:inline-block; width:38px; height:22px; flex-shrink:0; }
  .switch input { opacity:0; width:0; height:0; }
  .switch .sl { position:absolute; inset:0; background:var(--switch-off); border-radius:22px; transition:.2s; }
  .switch .sl:before { content:""; position:absolute; height:18px; width:18px; left:2px; top:2px; background:#fff;
                       border-radius:50%; transition:.2s; box-shadow:0 1px 2px rgba(0,0,0,.35); }
  .switch input:checked + .sl { background:var(--accent); }
  .switch input:checked + .sl:before { transform:translateX(16px); }

  /* Segmented control */
  .seg { display:inline-flex; background:var(--seg-bg); border-radius:8px; padding:2px; }
  .seg button { border:none; background:none; color:var(--fg); font:inherit; font-size:12px; font-weight:500;
                padding:4px 12px; border-radius:6px; cursor:pointer; }
  .seg button.active { background:var(--seg-active); box-shadow:0 1px 2px rgba(0,0,0,.18); }

  /* Chips / pills */
  .chip { font-size:11px; font-weight:600; padding:2px 8px; border-radius:20px; background:var(--seg-bg); color:var(--fg2); }
  .pill { font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px; display:inline-flex; align-items:center; gap:5px; }
  .pill .d { width:6px; height:6px; border-radius:50%; }
  .pill.success{ background:color-mix(in srgb,var(--ok) 16%,transparent); color:var(--ok); }
  .pill.failed,.pill.auth_error{ background:color-mix(in srgb,var(--danger) 16%,transparent); color:var(--danger); }
  .pill.rate_limited_waiting{ background:color-mix(in srgb,var(--warn) 18%,transparent); color:var(--warn); }
  .pill.running{ background:color-mix(in srgb,var(--running) 16%,transparent); color:var(--running); }
  .pill.success .d{background:var(--ok)} .pill.failed .d,.pill.auth_error .d{background:var(--danger)}
  .pill.rate_limited_waiting .d{background:var(--warn)} .pill.running .d{background:var(--running)}
  .unread-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); flex-shrink:0; }
  /* Activity rows: unread dot in a left gutter, mark-read eye in a right gutter — both outside the card. */
  .act-list { display:flex; flex-direction:column; gap:8px; }
  .act-line { display:flex; align-items:center; gap:8px; }
  .act-gl { width:10px; flex:none; display:flex; justify-content:center; }
  .act-gr { width:24px; flex:none; display:flex; justify-content:center; }
  .act-card { flex:1; min-width:0; display:flex; align-items:center; gap:12px;
              background:var(--card); border:.5px solid var(--hairline); border-radius:11px; padding:11px 15px; box-shadow:var(--shadow); }
  .eye-btn { background:none; border:none; padding:2px; cursor:pointer; color:var(--fg2); line-height:0; }
  .eye-btn:hover { color:var(--accent); }
  .eye-btn svg { width:18px; height:18px; stroke:currentColor; stroke-width:1.7; fill:none; }

  /* Forms */
  label.fld { display:block; font-size:12px; color:var(--fg2); margin:12px 0 4px; }
  input[type=text], input[type=number], input[type=datetime-local], textarea, select {
    width:100%; font:inherit; padding:7px 10px; border:.5px solid var(--hairline); border-radius:7px;
    background:var(--card-2); color:var(--fg); }
  .dir-row { display:flex; gap:8px; align-items:center; }
  .dir-row input { flex:1; }
  .icon-btn { padding:4px 8px; }
  .icon-btn svg { width:15px; height:15px; stroke:currentColor; stroke-width:1.8; fill:none; display:block; }
  input:focus, textarea:focus, select:focus { outline:2px solid color-mix(in srgb,var(--accent) 50%,transparent); outline-offset:-1px; }
  textarea { resize:vertical; }
  .form-row { display:flex; gap:12px; } .form-row > div { flex:1; }

  /* Empty state */
  .empty { text-align:center; color:var(--fg2); padding:48px 20px; }
  .empty .big { font-size:15px; color:var(--fg); font-weight:600; margin-bottom:4px; }

  /* Sheet (dialog) */
  dialog { border:none; border-radius:14px; padding:0; background:var(--card); color:var(--fg);
           box-shadow:0 20px 60px rgba(0,0,0,.35); width:520px; max-width:92vw; }
  #logSheet { width:1040px; }
  #logSheet pre.log { max-height:70vh; }
  dialog::backdrop { background:rgba(0,0,0,.35); backdrop-filter:blur(2px); }
  .sheet-hd { display:flex; align-items:center; padding:14px 18px; border-bottom:.5px solid var(--hairline); }
  .sheet-hd b { font-size:14px; } .sheet-bd { padding:16px 18px; max-height:70vh; overflow:auto; }
  .sheet-ft { display:flex; justify-content:flex-end; gap:8px; padding:12px 18px; border-top:.5px solid var(--hairline); }
  pre.log { font-family:"SF Mono",ui-monospace,Menlo,monospace; font-size:12px; background:var(--card-2);
            border:.5px solid var(--hairline); border-radius:8px; padding:12px; overflow:auto; max-height:62vh; white-space:pre-wrap; word-break:break-word; }
  .chat { display:flex; flex-direction:column; gap:10px; max-height:64vh; overflow:auto; padding:2px 2px 8px; }
  .msg { border-radius:10px; padding:9px 12px; font-size:13px; white-space:pre-wrap; word-break:break-word; line-height:1.5; }
  .msg.assistant { background:var(--card-2); border:.5px solid var(--hairline); }
  .msg.result { background:color-mix(in srgb, var(--accent) 12%, var(--card-2)); border:.5px solid var(--hairline); }
  .msg .who { font-size:10px; font-weight:700; color:var(--fg2); margin-bottom:4px; text-transform:uppercase; letter-spacing:.4px; }
  .tool { font-size:12px; background:var(--seg-bg); border-radius:8px; padding:7px 11px; }
  .tool .tname { font-weight:600; color:var(--accent); font-family:"SF Mono",ui-monospace,monospace; }
  .tool pre { margin:5px 0 0; white-space:pre-wrap; word-break:break-word; color:var(--fg2);
              font-family:"SF Mono",ui-monospace,monospace; font-size:11px; max-height:150px; overflow:auto; }
  .rawline { font-family:"SF Mono",ui-monospace,monospace; font-size:11px; color:var(--fg2); white-space:pre-wrap; word-break:break-word; opacity:.65; }

  /* Toasts */
  #toasts { position:fixed; bottom:18px; right:18px; display:flex; flex-direction:column; gap:8px; z-index:50; }
  .toast { background:var(--card); border:.5px solid var(--hairline); box-shadow:var(--shadow); border-radius:10px;
           padding:10px 14px; font-size:13px; min-width:200px; animation:slidein .18s ease; display:flex; gap:8px; align-items:center; }
  .toast .bar { width:3px; align-self:stretch; border-radius:3px; background:var(--accent); }
  .toast.err .bar { background:var(--danger); } .toast.ok .bar { background:var(--ok); }
  @keyframes slidein { from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none} }
  .hint { font-size:12px; color:var(--fg2); margin-top:6px; }
  .meter { height:8px; border-radius:6px; background:var(--seg-bg); overflow:hidden; width:100%; margin-top:8px; }
  .meter > span { display:block; height:100%; border-radius:6px; background:var(--accent); transition:width .3s; }
  .usage-num { font-size:30px; font-weight:700; letter-spacing:-.5px; }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="brand"><img class="logo" src="/logo.svg" alt="claudeq"><b>claudeq</b></div>
  <nav class="nav">
    <button data-tab="tasks" class="active">
      <svg viewBox="0 0 20 20"><path d="M4 6h12M4 10h12M4 14h12"/></svg> Tasks</button>
    <button data-tab="news">
      <svg viewBox="0 0 20 20"><path d="M10 3a4 4 0 0 1 4 4v3l1.5 2.5H4.5L6 10V7a4 4 0 0 1 4-4zM8 15a2 2 0 0 0 4 0"/></svg>
      Activity <span id="unreadCount" class="count" hidden>0</span></button>
    <button data-tab="usage">
      <svg viewBox="0 0 20 20"><path d="M3 14a7 7 0 1 1 14 0"/><path d="M10 14l4-4"/></svg>
      Usage</button>
    <button data-tab="settings">
      <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="2.5"/><path d="M10 3v2M10 15v2M3 10h2M15 10h2M5.5 5.5l1.4 1.4M13.1 13.1l1.4 1.4M14.5 5.5l-1.4 1.4M6.9 13.1l-1.4 1.4"/></svg>
      Settings</button>
  </nav>
  <div class="side-foot"><span class="dot" id="connDot"></span><span id="connText">connected</span></div>
</aside>

<div class="main">
  <div class="toolbar">
    <h1 id="pageTitle">Tasks</h1>
    <div class="spacer"></div>
    <div id="toolbarActions"></div>
  </div>
  <div class="content"><div class="wrap">
    <section id="tasks" class="tab"></section>
    <section id="news" class="tab" hidden></section>
    <section id="usage" class="tab" hidden></section>
    <section id="settings" class="tab" hidden></section>
  </div></div>
</div>

<!-- Add task sheet -->
<dialog id="addSheet">
  <div class="sheet-hd"><b id="addSheetTitle">New task</b></div>
  <div class="sheet-bd">
    <label class="fld">Name</label><input type="text" id="f-name" placeholder="Nightly build">
    <label class="fld">Prompt</label><textarea id="f-prompt" rows="3" placeholder="What should Claude do?"></textarea>
    <label class="fld">Working directory</label>
    <div class="dir-row"><input type="text" id="f-dir" placeholder="Choose a folder…" readonly>
      <button class="btn" id="f-dir-btn" title="Choose folder">📁</button></div>
    <label class="fld">Trigger</label>
    <div class="seg" id="f-trigger">
      <button data-v="asap" class="active">As soon as possible</button>
      <button data-v="fixed">Fixed time</button>
      <button data-v="cron">Recurring</button>
    </div>
    <div id="f-at-wrap" hidden><label class="fld">Earliest start</label><input type="datetime-local" id="f-at"></div>
    <div id="f-cron-wrap" hidden><label class="fld">Cron schedule</label><input type="text" id="f-cron" placeholder="0 20 * * *"></div>
    <div class="form-row">
      <div><label class="fld">Model</label><select id="f-model"></select></div>
    </div>
    <div class="group" style="margin-top:14px">
      <div class="row"><div class="grow"><div class="title">Run in parallel</div><div class="sub">May run alongside other parallel tasks</div></div>
        <label class="switch"><input type="checkbox" id="f-parallel"><span class="sl"></span></label></div>
      <div class="row"><div class="grow"><div class="title">Skip permission prompts</div><div class="sub">Needed for unattended writes</div></div>
        <label class="switch"><input type="checkbox" id="f-skip"><span class="sl"></span></label></div>
      <div class="row"><div class="grow"><div class="title">Notify me with the result</div><div class="sub">Send outcome + last message when it finishes</div></div>
        <label class="switch"><input type="checkbox" id="f-notify"><span class="sl"></span></label></div>
    </div>
    <p id="addErr" class="hint" style="color:var(--danger)"></p>
  </div>
  <div class="sheet-ft"><button class="btn" onclick="addSheet.close()">Cancel</button><button class="btn primary" id="addSubmitBtn" onclick="submitTask()">Add task</button></div>
</dialog>

<!-- Log sheet -->
<dialog id="logSheet">
  <div class="sheet-hd"><b id="logTitle">Log</b><div class="spacer" style="flex:1"></div>
    <div class="seg" id="logMode"><button data-v="chat" class="active">Chat</button><button data-v="raw">Raw</button></div></div>
  <div class="sheet-bd"><div id="logBody"></div></div>
  <div class="sheet-ft"><button class="btn" onclick="logSheet.close()">Done</button></div>
</dialog>

<!-- Confirm sheet -->
<dialog id="confirmSheet">
  <div class="sheet-bd" style="padding-top:20px"><b id="confirmText">Are you sure?</b></div>
  <div class="sheet-ft"><button class="btn" id="confirmNo">Cancel</button><button class="btn danger" id="confirmYes">Delete</button></div>
</dialog>

<div id="toasts"></div>

<script>
const $=s=>document.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
const esc=s=>(s??'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const EYE='<svg viewBox="0 0 20 20"><path d="M1.5 10S5 4.5 10 4.5 18.5 10 18.5 10 15 15.5 10 15.5 1.5 10 1.5 10z"/><circle cx="10" cy="10" r="2.3"/></svg>';
const PENCIL='<svg viewBox="0 0 20 20"><path d="M13.2 3.4l3.4 3.4L7.3 16 3.5 16.5 4 12.7z"/></svg>';
const REPLAY='<svg viewBox="0 0 20 20"><path d="M5 10a5 5 0 1 1 1.6 3.7"/><path d="M5 6.2V10h3.8"/></svg>';

async function api(m,path,body){
  const r=await fetch(path,{method:m,headers:body?{'Content-Type':'application/json'}:{},body:body?JSON.stringify(body):undefined});
  if(!r.ok&&r.status!==204){let e;try{e=(await r.json()).error}catch{e=r.statusText} throw new Error(e);}
  const ct=r.headers.get('content-type')||''; return ct.includes('json')?r.json():r.text();
}
function toast(msg,kind){ const t=el('div','toast'+(kind?' '+kind:'')); t.append(el('div','bar'),el('div',null,esc(msg)));
  $('#toasts').append(t); setTimeout(()=>{t.style.opacity='0';t.style.transition='.3s';setTimeout(()=>t.remove(),300)},2600); }
function confirmSheetAsk(text,yesLabel){ return new Promise(res=>{ $('#confirmText').textContent=text; $('#confirmYes').textContent=yesLabel||'Delete';
  const dlg=$('#confirmSheet'); let done=false;
  const finish=v=>{ if(done)return; done=true;
    $('#confirmYes').removeEventListener('click',onYes); $('#confirmNo').removeEventListener('click',onNo);
    dlg.removeEventListener('close',onClose); dlg.close(); res(v); };
  const onYes=()=>finish(true), onNo=()=>finish(false), onClose=()=>finish(false);
  $('#confirmYes').addEventListener('click',onYes); $('#confirmNo').addEventListener('click',onNo); dlg.addEventListener('close',onClose);
  dlg.showModal(); }); }
// Click on the dimmed backdrop closes any open modal.
document.querySelectorAll('dialog').forEach(d=>d.addEventListener('click',e=>{ if(e.target===d) d.close(); }));
let MODELS=[];
async function loadModels(){ try{ MODELS=await api('GET','/api/models'); }catch{ MODELS=[]; } }
function modelOptions(selected,globalLabel){
  let h=`<option value="">${esc(globalLabel)}</option>`;
  MODELS.forEach(m=>{ h+=`<option value="${esc(m.id)}"${m.id===selected?' selected':''}>${esc(m.label)}</option>`; });
  if(selected && !MODELS.some(m=>m.id===selected)) h+=`<option value="${esc(selected)}" selected>${esc(selected)} (custom)</option>`;
  return h;
}
function relTime(iso){ const d=new Date(iso), s=(Date.now()-d)/1000, a=Math.abs(s), fut=s<0;
  const f=(n,u)=> fut ? ('in '+n+' '+u) : (n+' '+u+' ago');
  if(a<60)return 'just now'; if(a<3600)return f(Math.floor(a/60),'min'); if(a<86400)return f(Math.floor(a/3600),'h');
  if(a<604800)return f(Math.floor(a/86400),'d'); return d.toLocaleDateString(); }

const TITLES={tasks:'Tasks',news:'Activity',usage:'Usage',settings:'Settings'};
let current='tasks';
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>select(b.dataset.tab));
function select(tab){ current=tab;
  document.querySelectorAll('.nav button').forEach(x=>x.classList.toggle('active',x.dataset.tab===tab));
  document.querySelectorAll('.tab').forEach(t=>t.hidden=t.id!==tab);
  $('#pageTitle').textContent=TITLES[tab];
  const ta=$('#toolbarActions'); ta.innerHTML='';
  if(tab==='tasks'){ const b=el('button','btn primary','+ New task'); b.onclick=openAdd; ta.append(b); loadTasks(); }
  if(tab==='news'){ const b=el('button','btn',EYE+'<span>Mark all read</span>'); b.onclick=markAllRead; ta.append(b); loadRuns(); }
  if(tab==='usage'){ const b=el('button','btn','Refresh'); b.onclick=loadUsage; ta.append(b); }
  if(tab==='usage') loadUsage();
  if(tab==='settings') loadSettings();
}

/* ---- Consumption statistics (tokens used via claudeq) ---- */
const fmtCost=n=>'$'+(n||0).toFixed(2);
const fmtTok=n=>{ n=n||0; return n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?(n/1e3).toFixed(1)+'k':(''+n); };
const fmtDur=ms=>{ const s=Math.round((ms||0)/1000); if(s<60)return s+'s'; const m=Math.floor(s/60); if(m<60)return m+'m'; return Math.floor(m/60)+'h '+(m%60)+'m'; };
const statCell=(label,val)=>`<div style="flex:1;min-width:84px"><div class="usage-num" style="font-size:20px">${val}</div><div class="sub">${label}</div></div>`;

async function loadUsage(){
  let stats; try{ stats=await api('GET','/api/stats'); setConn(true);}catch(e){ setConn(false); return; }
  const c=$('#usage'); c.innerHTML='';
  if(!stats) return;
  const tot=stats.totals, w=stats.last_7d;
  if(tot.runs===0){ c.append(emptyState('Nothing consumed yet','Token usage appears here after claudeq has run some tasks.')); return; }

  const totalTok=tot.input_tokens+tot.output_tokens;
  const head=el('div');
  head.innerHTML=`<div class="section-label">Total consumed via claudeq</div>
    <div class="group"><div class="row" style="display:block">
      <div class="sub">Tokens</div>
      <div class="usage-num">${fmtTok(totalTok)}</div>
      <div class="sub" style="margin-top:6px">${fmtTok(tot.input_tokens)} in · ${fmtTok(tot.output_tokens)} out · ${fmtCost(tot.cost_usd)} · ${tot.runs} runs · ${fmtDur(tot.duration_ms)}</div>
    </div></div>
    <div class="section-label">Last 7 days</div>
    <div class="group"><div class="row" style="gap:18px;flex-wrap:wrap">
      ${statCell('tokens',fmtTok(w.input_tokens+w.output_tokens))}${statCell('cost',fmtCost(w.cost_usd))}${statCell('runs',w.runs)}${statCell('succeeded',w.success)}${statCell('failed',w.failed)}${statCell('runtime',fmtDur(w.duration_ms))}
    </div></div>`;
  c.append(head);

  const maxTok=Math.max(1,...stats.per_day.map(d=>d.tokens));
  const bars=stats.per_day.map(d=>{
    const h=Math.round((d.tokens/maxTok)*54);
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px" title="${esc(d.date)}: ${fmtTok(d.tokens)} tokens · ${d.runs} runs · ${fmtCost(d.cost_usd)}">
      <div style="width:100%;display:flex;align-items:flex-end;height:56px"><div style="width:70%;margin:0 auto;height:${d.tokens?(h||2):0}px;border-radius:3px 3px 0 0;background:${d.tokens?'var(--accent)':'var(--seg-bg)'}"></div></div>
      <div class="sub" style="font-size:10px">${esc(d.date.slice(5))}</div></div>`;
  }).join('');
  const chart=el('div');
  chart.innerHTML=`<div class="section-label">Tokens per day (14d)</div>
    <div class="group"><div class="row" style="align-items:flex-end;gap:2px">${bars}</div></div>
    <p class="hint">Counts only what claudeq itself consumed (input + output tokens recorded per run). It is not your overall Claude account usage.</p>`;
  c.append(chart);
}

/* ---- Tasks ---- */
async function loadTasks(){
  let tasks; try{ tasks=await api('GET','/api/tasks'); setConn(true);}catch(e){ setConn(false); return; }
  const c=$('#tasks'); c.innerHTML='';
  if(!tasks||!tasks.length){ c.append(emptyState('No tasks yet','Create your first task to queue work for Claude.')); return; }
  const label=el('div','section-label',tasks.length+' task'+(tasks.length>1?'s':'')+' · top = highest priority'); c.append(label);
  const g=el('div','group');
  tasks.forEach((t,i)=>{
    const when=t.trigger==='fixed'?new Date(t.fixed_at).toLocaleString():t.trigger==='cron'?t.cron:'as soon as possible';
    const row=el('div','row');
    const grow=el('div','grow'); grow.innerHTML=`<div class="title">${esc(t.name)} ${t.parallel?'<span class="chip">parallel</span>':''}</div>
      <div class="sub"><span class="mono">${esc(t.id)}</span> · ${esc(t.trigger)} · ${esc(when)}</div>`;
    row.append(grow);
    const up=el('button','btn small','↑'); up.disabled=i===0; up.title='Move up'; up.onclick=()=>move(t.id,i-1);
    const run=el('button','btn small','Run now'); run.onclick=()=>runNow(t.id);
    const edit=el('button','btn small iconly',PENCIL); edit.title='Edit'; edit.onclick=()=>openEdit(t);
    const sw=el('label','switch'); sw.innerHTML=`<input type="checkbox" ${t.enabled?'checked':''}><span class="sl"></span>`;
    sw.querySelector('input').onchange=()=>toggle(t.id,t.enabled);
    const del=el('button','btn small danger','✕'); del.title='Delete'; del.onclick=()=>del_(t.id,t.name);
    row.append(up,run,edit,sw,del);
    g.append(row);
  });
  c.append(g);
}
function emptyState(big,sub){ const d=el('div','empty'); d.innerHTML=`<div class="big">${esc(big)}</div><div>${esc(sub)}</div>`; return d; }

let taskMode='add', taskEditId='';
function pad2(n){ return String(n).padStart(2,'0'); }
function toLocalDT(iso){ const d=new Date(iso); return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())+'T'+pad2(d.getHours())+':'+pad2(d.getMinutes()); }
function prefillTask(t){
  $('#f-name').value=t.name||''; $('#f-prompt').value=t.prompt||''; $('#f-dir').value=t.working_dir||'';
  $('#f-model').innerHTML=modelOptions(t.model||'','Global default');
  $('#f-parallel').checked=!!t.parallel; $('#f-skip').checked=(t.permissions==='skip'); $('#f-notify').checked=!!t.notify_on_result;
  setSeg(t.trigger||'asap');
  $('#f-at').value=(t.trigger==='fixed'&&t.fixed_at&&!String(t.fixed_at).startsWith('0001'))?toLocalDT(t.fixed_at):'';
  $('#f-cron').value=t.trigger==='cron'?(t.cron||''):'';
}
function openSheet(title,submitLabel){ $('#addErr').textContent=''; $('#addSheetTitle').textContent=title; $('#addSubmitBtn').textContent=submitLabel; $('#addSheet').showModal(); }
function openAdd(){ taskMode='add'; taskEditId='';
  ['f-name','f-prompt','f-dir','f-at','f-cron'].forEach(x=>$('#'+x).value='');
  $('#f-model').innerHTML=modelOptions('','Global default');
  $('#f-parallel').checked=false; $('#f-skip').checked=false; $('#f-notify').checked=false; setSeg('asap');
  openSheet('New task','Add task'); }
function openEdit(t){ taskMode='edit'; taskEditId=t.id; prefillTask(t); openSheet('Edit task','Save changes'); }
function openReplay(t){ if(!t){ toast('No saved definition to replay','err'); return; } taskMode='add'; taskEditId=''; prefillTask(t); openSheet('Replay task','Schedule again'); }
$('#f-trigger').querySelectorAll('button').forEach(b=>b.onclick=()=>setSeg(b.dataset.v));
function setSeg(v){ $('#f-trigger').querySelectorAll('button').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
  $('#f-trigger').dataset.value=v; $('#f-at-wrap').hidden=v!=='fixed'; $('#f-cron-wrap').hidden=v!=='cron'; }
async function submitTask(){
  $('#addErr').textContent='';
  const trig=$('#f-trigger').dataset.value||'asap';
  const t={name:$('#f-name').value.trim(),prompt:$('#f-prompt').value,
    working_dir:$('#f-dir').value.trim(),trigger:trig,
    fixed_at: trig==='fixed'&&$('#f-at').value?new Date($('#f-at').value).toISOString():undefined,
    cron: trig==='cron'?$('#f-cron').value.trim():undefined, model:$('#f-model').value||undefined,
    parallel:$('#f-parallel').checked, enabled:true, permissions:$('#f-skip').checked?'skip':'default',
    notify_on_result:$('#f-notify').checked};
  if(!t.working_dir){ $('#addErr').textContent='Please choose a working directory.'; return; }
  try{
    if(taskMode==='edit'){ await api('PUT','/api/tasks/'+encodeURIComponent(taskEditId),t); toast('Task updated','ok'); }
    else { await api('POST','/api/tasks',t); toast('Task added','ok'); }
    $('#addSheet').close(); loadTasks(); if(current==='news') loadRuns();
  }catch(e){ $('#addErr').textContent=e.message; }
}
/* ---- Folder picker (native macOS dialog) ---- */
$('#f-dir-btn').onclick=chooseFolder;
async function chooseFolder(){
  try{
    const q=$('#f-dir').value?('?path='+encodeURIComponent($('#f-dir').value)):'';
    const r=await api('POST','/api/fs/choose'+q);
    if(r && typeof r!=='string' && r.path) $('#f-dir').value=r.path; // 204/empty => cancelled
  }catch(e){ toast('Folder dialog unavailable: '+e.message,'err'); }
}

async function runNow(id){
  try{ await api('POST',`/api/tasks/${id}/run-now`); }catch(e){ toast(e.message,'err'); return; }
  toast('Started');
  select('news');           // jump to Activity
  watchNewRun(id);          // find the fresh run and open its live log
}
// Poll briefly until the just-started run for this task appears, then open its
// (live-updating) log.
function watchNewRun(id){
  const deadline=Date.now()+12000;
  const tick=async()=>{
    let runs=[]; try{ runs=await api('GET','/api/runs'); }catch{}
    runsSig=''; loadRuns();
    const run=runs.find(r=>r.task_id===id); // newest-first, so first match is the latest
    if(run){ showLog(run.run_id, run.task_name); return; }
    if(Date.now()<deadline) setTimeout(tick,500);
  };
  setTimeout(tick,400);
}
async function toggle(id,on){ try{ await api('POST',`/api/tasks/${id}/${on?'disable':'enable'}`); toast(on?'Paused':'Enabled','ok'); loadTasks();}catch(e){toast(e.message,'err');loadTasks()} }
async function move(id,to){ try{ await api('POST',`/api/tasks/${id}/move?to=${to}`); loadTasks();}catch(e){toast(e.message,'err')} }
async function del_(id,name){ if(await confirmSheetAsk('Delete task “'+name+'”?')){ try{await api('DELETE',`/api/tasks/${id}`);toast('Deleted','ok');loadTasks();}catch(e){toast(e.message,'err')} } }

/* ---- Activity ---- */
let runsSig='';
async function loadRuns(){
  let runs; try{ runs=await api('GET','/api/runs'); setConn(true);}catch(e){ setConn(false); return; }
  const unread=runs.filter(r=>r.unread).length; const badge=$('#unreadCount'); badge.hidden=unread===0; badge.textContent=unread;
  // Re-render only when the data actually changed, so the 5s poll doesn't
  // rebuild the DOM (and make the buttons flicker) on every tick.
  const sig=JSON.stringify(runs.map(r=>[r.run_id,r.status,r.unread]));
  if(sig===runsSig && $('#news').childElementCount) return;
  runsSig=sig;
  const c=$('#news'); c.innerHTML='';
  if(!runs.length){ c.append(emptyState('No activity yet','Runs will appear here after tasks execute.')); return; }
  const list=el('div','act-list');
  runs.forEach(r=>{
    const line=el('div','act-line');
    const gl=el('div','act-gl'); if(r.unread) gl.append(el('div','unread-dot'));
    const card=el('div','act-card');
    const grow=el('div','grow'); grow.innerHTML=`<div class="title">${esc(r.task_name)}</div><div class="sub">${relTime(r.started_at)}</div>`;
    const pill=el('span','pill '+r.status); pill.innerHTML=`<span class="d"></span>${esc(r.status.replace(/_/g,' '))}`;
    const actions=el('div','row-actions');
    if(r.task){ const rp=el('button','btn small iconly',REPLAY); rp.title='Re-run this task'; rp.onclick=()=>openReplay(r.task); actions.append(rp); }
    const log=el('button','btn small','Log'); log.onclick=()=>showLog(r.run_id,r.task_name); actions.append(log);
    card.append(grow,actions,pill);   // status pill right-aligned (last)
    const gr=el('div','act-gr'); if(r.unread){ const mr=el('button','eye-btn',EYE); mr.title='Mark read'; mr.onclick=()=>readRun(r.run_id); gr.append(mr); }
    line.append(gl,card,gr);
    list.append(line);
  });
  c.append(list);
}
async function readRun(id){ try{ await api('POST',`/api/runs/${id}/read`); }catch{} runsSig=''; loadRuns(); }
async function markAllRead(){ try{await api('POST','/api/runs/read-all');toast('All marked read','ok'); runsSig=''; loadRuns();}catch(e){toast(e.message,'err')} }
let logRaw='', logMode='chat', logRunId='', logTimer=null, logPrev=null;
async function showLog(id,name){ logRunId=id; $('#logTitle').textContent='Log · '+name;
  logPrev=null; await refreshLog(true); $('#logSheet').showModal(); startLogPolling(); }
async function refreshLog(force){
  try{ logRaw=await api('GET',`/api/runs/${logRunId}/log`)||''; }catch(e){ logRaw=''; }
  if(!force && logRaw===logPrev) return;   // nothing new -> don't re-render (no flicker)
  logPrev=logRaw; renderLog();
  const box=$('#logBody'); box.scrollTop=box.scrollHeight; // fast-forward to the newest output
}
function startLogPolling(){ stopLogPolling(); logTimer=setInterval(async()=>{
  let runs=[]; try{ runs=await api('GET','/api/runs'); }catch{}
  const run=runs.find(r=>r.run_id===logRunId);
  await refreshLog(false);
  if(run && run.status!=='running'){ stopLogPolling(); runsSig=''; if(current==='news') loadRuns(); }
}, 1500); }
function stopLogPolling(){ if(logTimer){ clearInterval(logTimer); logTimer=null; } }
$('#logSheet').addEventListener('close',stopLogPolling);
$('#logMode').querySelectorAll('button').forEach(b=>b.onclick=()=>{ logMode=b.dataset.v;
  $('#logMode').querySelectorAll('button').forEach(x=>x.classList.toggle('active',x.dataset.v===logMode)); renderLog(); });
function renderLog(){
  const box=$('#logBody');
  if(logMode==='raw'){ box.className=''; box.innerHTML='<pre class="log">'+esc(logRaw||'(empty log)')+'</pre>'; return; }
  box.className='chat'; box.innerHTML='';
  let shown=0;
  for(const raw of logRaw.split('\n')){ const line=raw.trim(); if(!line) continue;
    let ev; try{ ev=JSON.parse(line); }catch{ box.append(el('div','rawline',esc(line))); shown++; continue; }
    shown += appendLogEvent(box, ev);
  }
  if(!shown) box.append(el('div','rawline','(empty log)'));
}
const shortJSON=o=>{ let s; try{ s=JSON.stringify(o); }catch{ s=String(o); } return s.length>800?s.slice(0,800)+' …':s; };
function toolResultText(c){ if(typeof c==='string') return c; if(Array.isArray(c)) return c.map(x=>x&&x.text?x.text:(typeof x==='string'?x:JSON.stringify(x))).join('\n'); return c==null?'':JSON.stringify(c); }
function appendLogEvent(box, ev){
  if(ev.type==='assistant' && ev.message && Array.isArray(ev.message.content)){
    let n=0;
    for(const b of ev.message.content){
      if(b.type==='text' && b.text && b.text.trim()){ const m=el('div','msg assistant','<div class="who">Claude</div>'+esc(b.text)); box.append(m); n++; }
      else if(b.type==='tool_use'){ const d=el('div','tool','<span class="tname">🔧 '+esc(b.name||'tool')+'</span><pre>'+esc(shortJSON(b.input))+'</pre>'); box.append(d); n++; }
    }
    return n;
  }
  if(ev.type==='user' && ev.message && Array.isArray(ev.message.content)){
    let n=0;
    for(const b of ev.message.content){ if(b.type==='tool_result'){ const txt=toolResultText(b.content);
      const d=el('div','tool','<span class="tname">↳ result</span><pre>'+esc(txt.length>800?txt.slice(0,800)+' …':txt)+'</pre>'); box.append(d); n++; } }
    return n;
  }
  if(ev.type==='result'){ box.append(el('div','msg result','<div class="who">Result'+(ev.is_error?' · error':'')+'</div>'+esc(ev.result||'(no text)'))); return 1; }
  if(ev.type==='system' && ev.subtype==='init'){ box.append(el('div','rawline','session started'+(ev.model?' · '+esc(ev.model):''))); return 0; }
  return 0;
}

/* ---- Settings ---- */
async function loadSettings(){
  let s; try{ s=await api('GET','/api/settings'); setConn(true);}catch(e){ setConn(false); return; }
  const c=$('#settings');
  const hbOpts=[[15,'Every 15 minutes'],[30,'Every 30 minutes'],[60,'Every hour'],[120,'Every 2 hours'],[180,'Every 3 hours'],[360,'Every 6 hours']];
  const hbVal=s.heartbeat_minutes||60;
  let hbHtml=hbOpts.map(([v,l])=>`<option value="${v}"${v===hbVal?' selected':''}>${l}</option>`).join('');
  if(!hbOpts.some(([v])=>v===hbVal)) hbHtml=`<option value="${hbVal}" selected>Every ${hbVal} minutes</option>`+hbHtml;
  const poOn=!!s.pushover?.enabled;
  c.innerHTML=`
    <div class="section-label">General</div>
    <div class="group">
      <div class="row"><div class="grow"><div class="title">Default model</div><div class="sub">Used unless a task overrides it</div></div>
        <select id="s-model" style="max-width:230px">${modelOptions(s.default_model||'','Claude default')}</select></div>
      <div class="row"><div class="grow"><div class="title">Skip permission prompts by default</div><div class="sub">Global “may do anything”</div></div>
        <label class="switch"><input type="checkbox" id="s-skip"><span class="sl"></span></label></div>
      <div class="row"><div class="grow"><div class="title">Check for due tasks every</div><div class="sub">How often the daemon wakes to look for work</div></div>
        <select id="s-hb" style="max-width:170px">${hbHtml}</select></div>
    </div>
    <div class="section-label">Notifications · Pushover</div>
    <div class="group">
      <div class="row"><div class="grow"><div class="title">Send to Pushover</div><div class="sub">Push run alerts to your phone</div></div>
        <label class="switch"><input type="checkbox" id="s-po-enabled"><span class="sl"></span></label></div>
      <div class="row"><div class="grow"><div class="title">API token</div></div><input type="text" id="s-po-token" style="max-width:230px"></div>
      <div class="row"><div class="grow"><div class="title">User key</div></div><input type="text" id="s-po-user" style="max-width:230px"></div>
    </div>
    <button class="btn primary" id="s-save">Save changes</button> <span id="setMsg" class="hint"></span>`;
  $('#s-skip').checked=!!s.skip_permissions_default;
  $('#s-po-enabled').checked=poOn; $('#s-po-token').value=s.pushover?.token||''; $('#s-po-user').value=s.pushover?.user_key||'';
  $('#s-save').onclick=saveSettings;
}
async function saveSettings(){
  const body={default_model:$('#s-model').value,skip_permissions_default:$('#s-skip').checked,
    heartbeat_minutes:parseInt($('#s-hb').value||'60',10),
    pushover:{enabled:$('#s-po-enabled').checked,token:$('#s-po-token').value,user_key:$('#s-po-user').value}};
  try{ await api('PUT','/api/settings',body); toast('Settings saved','ok'); }catch(e){ toast(e.message,'err'); }
}

function setConn(ok){ $('#connDot').style.background=ok?'var(--ok)':'var(--danger)'; $('#connText').textContent=ok?'connected':'disconnected'; }

// Poll activity for the unread badge + live updates.
setInterval(()=>{ loadRuns(); }, 5000);
loadModels().then(()=>select('tasks'));
</script>
